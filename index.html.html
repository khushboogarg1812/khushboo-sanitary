<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Khushboo Sanitary World</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --bg:#F5F3EE;--surface:#FFFFFF;--surface2:#EDEBE4;
  --text:#18170F;--text2:#6A6858;--text3:#A09E90;
  --border:#E0DDD3;--border2:#C8C4B8;
  --blue:#1A5FA8;--blue-bg:#E7F0FB;--blue-lt:#C6DCF5;
  --green:#27650C;--green-bg:#E6F4D8;--green-lt:#B8E08A;
  --amber:#7B4700;--amber-bg:#FFF1D6;--amber-lt:#FFD185;
  --red:#A01818;--red-bg:#FDEBEB;--red-lt:#F8BBBB;
  --teal:#0B5E52;--teal-bg:#DFF5F0;--teal-lt:#A0DFD4;
  --purple:#3E339A;--purple-bg:#EEEDFD;--purple-lt:#C5C0F0;
  --r:12px;--r-sm:8px;
  --sh:0 1px 3px rgba(0,0,0,0.07);
  --sh-md:0 4px 16px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;}

.header{background:var(--blue);color:#fff;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.18);}
.header-left{display:flex;align-items:center;gap:12px;}
.header-icon{width:36px;height:36px;background:rgba(255,255,255,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand{font-size:17px;font-weight:800;letter-spacing:-0.2px;}
.brand-sub{font-size:11px;opacity:0.6;margin-top:1px;}
.hbtns{display:flex;gap:7px;}
.hbtn{padding:7px 13px;border:1.5px solid rgba(255,255,255,0.3);border-radius:var(--r-sm);background:rgba(255,255,255,0.12);color:#fff;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.hbtn:hover{background:rgba(255,255,255,0.22);}

.locbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;position:sticky;top:58px;z-index:150;}
.locbar::-webkit-scrollbar{display:none;}
.ltb{flex-shrink:0;padding:13px 15px;border:none;background:transparent;font-size:13.5px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;}
.ltb:hover{color:var(--text);}
.ltb.act{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

.navbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.navbar::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:9px 14px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:var(--r-sm);margin:4px 0;transition:all 0.15s;display:flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap;}
.nb:hover{background:var(--border);color:var(--text);}
.nb.act{background:var(--blue);color:#fff;}
.nb i{font-size:13px;}

.body{padding:18px 20px;max-width:1200px;margin:0 auto;}

.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:11px 15px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);box-shadow:var(--sh-md);font-size:13.5px;display:flex;align-items:center;gap:8px;min-width:210px;animation:tIn 0.2s ease;}
.toast.ok{background:var(--green-bg);border-color:var(--green-lt);color:var(--green);}
.toast.warn{background:var(--amber-bg);border-color:var(--amber-lt);color:var(--amber);}
.toast.err{background:var(--red-bg);border-color:var(--red-lt);color:var(--red);}
@keyframes tIn{from{transform:translateY(10px);opacity:0;}to{transform:none;opacity:1;}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh);}
.ctitle{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ctitle i{color:var(--blue);}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:16px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;box-shadow:var(--sh);}
.mlabel{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px;}
.mval{font-size:22px;font-weight:800;line-height:1.1;}
.mval.blue{color:var(--blue);}
.mval.green{color:var(--green);}
.mval.red{color:var(--red);}
.mval.amber{color:var(--amber);}
.mval.teal{color:var(--teal);}

.wgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:10px;margin-bottom:14px;}
.wcard{border-radius:var(--r);padding:13px 12px;border:1px solid transparent;}
.wcard.s{background:var(--green-bg);border-color:var(--green-lt);}
.wcard.p{background:var(--blue-bg);border-color:var(--blue-lt);}
.wcard.st{background:var(--teal-bg);border-color:var(--teal-lt);}
.wcard.i{background:var(--amber-bg);border-color:var(--amber-lt);}
.wlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;opacity:0.65;}
.wval{font-size:19px;font-weight:800;line-height:1;margin-bottom:2px;}
.wsub{font-size:11px;opacity:0.6;}
.wcard.s .wlabel,.wcard.s .wval{color:var(--green);}
.wcard.p .wlabel,.wcard.p .wval{color:var(--blue);}
.wcard.st .wlabel,.wcard.st .wval{color:var(--teal);}
.wcard.i .wlabel,.wcard.i .wval{color:var(--amber);}

.alert{padding:11px 13px;border-radius:var(--r-sm);font-size:13.5px;display:flex;align-items:flex-start;gap:9px;margin-bottom:8px;border:1px solid transparent;}
.alert i{font-size:14px;margin-top:2px;flex-shrink:0;}
.alert.warn{background:var(--amber-bg);border-color:var(--amber-lt);color:var(--amber);}
.alert.err{background:var(--red-bg);border-color:var(--red-lt);color:var(--red);}
.alert.ok{background:var(--green-bg);border-color:var(--green-lt);color:var(--green);}
.alert.info{background:var(--blue-bg);border-color:var(--blue-lt);color:var(--blue);}

.tw{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
.tbl th{background:var(--surface2);color:var(--text2);font-weight:700;padding:9px 12px;text-align:left;font-size:11px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.05em;}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg);}
.tbl tr.row-crit td{background:#FFF5F5;}
.tbl tr.row-low td{background:#FFFAF0;}
.qnum{font-size:19px;font-weight:800;}

.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 8px;border-radius:99px;font-weight:700;}
.badge.ok{background:var(--green-bg);color:var(--green);}
.badge.low{background:var(--amber-bg);color:var(--amber);}
.badge.crit{background:var(--red-bg);color:var(--red);}
.cat-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;margin-left:4px;font-weight:600;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit;transition:all 0.15s;white-space:nowrap;font-weight:500;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(0.97);}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.primary:hover{background:#154e8c;}
.btn.green{background:var(--green-bg);color:var(--green);border-color:var(--green-lt);}
.btn.green:hover{background:var(--green-lt);}
.btn.red{background:var(--red-bg);color:var(--red);border-color:var(--red-lt);}
.btn.red:hover{background:var(--red-lt);}
.btn.amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-lt);}
.btn.amber:hover{background:var(--amber-lt);}
.btn.purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-lt);}
.btn.teal{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-lt);}
.btn.full{width:100%;padding:12px;font-size:15px;font-weight:700;border-radius:var(--r);}
.btn[disabled]{opacity:0.35;cursor:not-allowed;pointer-events:none;}
.ibtn{width:34px;height:34px;padding:0;border-radius:var(--r-sm);flex-shrink:0;}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fg label{font-size:12px;font-weight:700;color:var(--text2);}
.fg input,.fg select{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;width:100%;transition:border 0.15s;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,168,0.1);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.qin{width:64px;padding:8px 6px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-weight:700;text-align:center;background:var(--surface);color:var(--text);font-family:inherit;}
.qin:focus{outline:none;border-color:var(--blue);}

.plbox{border-radius:var(--r);padding:18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.pl-p{background:var(--green-bg);border:1px solid var(--green-lt);}
.pl-l{background:var(--red-bg);border:1px solid var(--red-lt);}
.plbig{font-size:38px;font-weight:900;line-height:1;}

.loc-overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px;margin-bottom:16px;}
.lcrd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh);cursor:pointer;transition:box-shadow 0.15s;}
.lcrd:hover{box-shadow:var(--sh-md);}

.tx-item{padding:11px 14px;border-bottom:1px solid var(--border);}
.tx-item:last-child{border-bottom:none;}

/* Report styles */
.rep-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.rtb{padding:9px 18px;border:1.5px solid var(--border);border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text2);transition:all 0.15s;font-family:inherit;}
.rtb:hover{border-color:var(--blue);color:var(--blue);}
.rtb.act{background:var(--blue);color:#fff;border-color:var(--blue);}
.rep-card{background:linear-gradient(135deg,var(--blue) 0%,#0E3D7A 100%);color:#fff;border-radius:var(--r);padding:20px;margin-bottom:14px;}
.rep-title{font-size:22px;font-weight:900;margin-bottom:4px;}
.rep-sub{font-size:12px;opacity:0.65;margin-bottom:16px;}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;}
.rep-stat{background:rgba(255,255,255,0.12);border-radius:var(--r-sm);padding:12px;}
.rep-stat-label{font-size:10px;opacity:0.7;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;}
.rep-stat-val{font-size:20px;font-weight:800;}
.share-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.sbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.sbtn.wa{background:#25D366;color:#fff;}
.sbtn.wa:hover{background:#1aad4f;}
.sbtn.em{background:rgba(255,255,255,0.18);color:#fff;border:1.5px solid rgba(255,255,255,0.35);}
.sbtn.em:hover{background:rgba(255,255,255,0.28);}
.sbtn.copy{background:rgba(255,255,255,0.18);color:#fff;border:1.5px solid rgba(255,255,255,0.35);}
.sbtn.copy:hover{background:rgba(255,255,255,0.28);}

.hist-item{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.12s;}
.hist-item:hover{background:var(--bg);}
.hist-item:last-child{border-bottom:none;}


.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-pill{padding:6px 14px;border:1.5px solid var(--border);border-radius:99px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text2);font-family:inherit;transition:all 0.15s;font-weight:500;}
.filter-pill:hover{border-color:var(--border2);color:var(--text);}
.filter-pill.act{background:var(--blue);color:#fff;border-color:var(--blue);}
.search-inp{flex:1;min-width:180px;padding:8px 12px 8px 36px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;}
.search-inp:focus{outline:none;border-color:var(--blue);}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;}

.stitle{font-size:18px;font-weight:800;margin-bottom:3px;}
.ssub{font-size:13px;color:var(--text2);margin-bottom:16px;}


/* ── PIN LOCK ── */
.pin-overlay{position:fixed;inset:0;background:var(--blue);z-index:9999;display:flex;align-items:center;justify-content:center;}
.pin-box{background:#fff;border-radius:20px;padding:36px 32px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.pin-logo{font-size:40px;margin-bottom:10px;}
.pin-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--border);transition:background 0.15s;}
.pin-dot.filled{background:var(--blue);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.pin-btn{height:60px;border:1.5px solid var(--border);border-radius:12px;font-size:22px;font-weight:700;cursor:pointer;background:#fff;color:var(--text);font-family:inherit;transition:all 0.12s;}
.pin-btn:hover{background:var(--blue-bg);border-color:var(--blue);}
.pin-btn:active{transform:scale(0.94);background:var(--blue);color:#fff;}
.pin-clear{height:60px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;background:#fff;color:var(--red);font-family:inherit;border-color:var(--red-lt);transition:all 0.12s;}
.pin-clear:hover{background:var(--red-bg);}
.pin-error{font-size:13px;color:var(--red);margin-top:8px;min-height:18px;font-weight:600;}
.pin-change{margin-top:16px;font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline;}

@media(max-width:700px){
  .body{padding:10px 12px;}
  .r2,.r3{grid-template-columns:1fr;}
  .metrics{grid-template-columns:1fr 1fr;}
  .wgrid{grid-template-columns:1fr 1fr;}
  .loc-overview{grid-template-columns:1fr 1fr;}
  .plbig{font-size:26px;}
  .brand{font-size:14px;}
  .hbtn span{display:none;}
}
@media print{
  .header .hbtns,.locbar,.navbar,.btn,.fg,.qin,.share-row,.rep-tabs{display:none!important;}
  .body{padding:0;}body{background:#fff;}
  .card,.rep-card{box-shadow:none;}
}
</style>
</head>
<body>


<!-- PIN LOCK -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-logo">🔐</div>
    <div class="pin-title">Khushboo Sanitary World</div>
    <div class="pin-sub" id="pinSubText">Enter your 4-digit PIN to continue</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-clear" onclick="pinClear()">⌫ Clear</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-clear" onclick="pinReset()" style="font-size:12px">Reset</button>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-change" onclick="pinForgot()">Forgot PIN? Reset to default</div>
  </div>
</div>

<header class="header">
  <div class="header-left">
    <div class="header-icon">🪠</div>
    <div>
      <div class="brand">Khushboo Sanitary World</div>
      <div class="brand-sub">Stock & Inventory Manager</div>
    </div>
  </div>
  <div class="hbtns">
    <button class="hbtn" onclick="changePIN()"><i class="fa-solid fa-lock"></i><span>PIN</span></button>
    <button class="hbtn" onclick="saveData()"><i class="fa-solid fa-floppy-disk"></i><span>Save</span></button>
    <button class="hbtn" onclick="window.print()"><i class="fa-solid fa-print"></i><span>Print</span></button>
  </div>
</header>

<div class="locbar" id="locbar">
  <button class="ltb act" onclick="setLoc('all')" id="ltb-all"><span class="ldot" style="background:#888"></span>All</button>
  <button class="ltb" onclick="setLoc('shop')" id="ltb-shop"><span class="ldot" style="background:#1A5FA8"></span>Shop</button>
  <button class="ltb" onclick="setLoc('g1')" id="ltb-g1"><span class="ldot" style="background:#27650C"></span>Godown 1</button>
  <button class="ltb" onclick="setLoc('g2')" id="ltb-g2"><span class="ldot" style="background:#7B4700"></span>Godown 2</button>
  <button class="ltb" onclick="setLoc('g3')" id="ltb-g3"><span class="ldot" style="background:#3E339A"></span>Godown 3</button>
  <button class="ltb" onclick="setLoc('g4')" id="ltb-g4"><span class="ldot" style="background:#0B5E52"></span>Godown 4</button>
</div>

<div class="navbar">
  <button class="nb act" onclick="setPage('home')" id="nb-home"><i class="fa-solid fa-house"></i>Home</button>
  <button class="nb" onclick="setPage('stock')" id="nb-stock"><i class="fa-solid fa-boxes-stacked"></i>Stock</button>
  <button class="nb" onclick="setPage('sale')" id="nb-sale"><i class="fa-solid fa-receipt"></i>Sale</button>
  <button class="nb" onclick="setPage('purchase')" id="nb-purchase"><i class="fa-solid fa-truck"></i>Purchase</button>
  <button class="nb" onclick="setPage('pl')" id="nb-pl"><i class="fa-solid fa-chart-line"></i>P&amp;L</button>
  <button class="nb" onclick="setPage('transfer')" id="nb-transfer"><i class="fa-solid fa-arrows-left-right"></i>Transfer</button>
  <button class="nb" onclick="setPage('reports')" id="nb-reports"><i class="fa-solid fa-file-lines"></i>Reports</button>
  <button class="nb" onclick="setPage('analytics')" id="nb-analytics"><i class="fa-solid fa-magnifying-glass-chart"></i>Analytics</button>
  <button class="nb" onclick="setPage('log')" id="nb-log"><i class="fa-solid fa-clock-rotate-left"></i>Log</button>
</div>

<div class="body" id="body"></div>
<div class="toast-wrap" id="tw"></div>

<script>
const LOCS={shop:{name:'Shop',dot:'#1A5FA8'},g1:{name:'Godown 1',dot:'#27650C'},g2:{name:'Godown 2',dot:'#7B4700'},g3:{name:'Godown 3',dot:'#3E339A'},g4:{name:'Godown 4',dot:'#0B5E52'}};
const LKS=['shop','g1','g2','g3','g4'];
const CATS=['Pipes','Fittings','Sanitary','Electrical','Tiles','Cement','Accessories'];
const CP={Pipes:'#DAEEFF',Fittings:'#D6F5C2',Sanitary:'#FFE0ED',Electrical:'#FFF0C8',Tiles:'#EEEDFD',Cement:'#E8E6DC',Accessories:'#D6F5EE'};
const CT={Pipes:'#0A3D7A',Fittings:'#174506',Sanitary:'#6C1235',Electrical:'#583200',Tiles:'#2C247E',Cement:'#38362C',Accessories:'#083D2E'};
const fmt=n=>'₹'+Math.round(n).toLocaleString('en-IN');
const fmtN=n=>Math.round(n).toLocaleString('en-IN');

function saveData(silent){
  try{localStorage.setItem('ksw_v2',JSON.stringify({data,txLog,history,nid}));if(!silent)toast('Saved ✓','ok');}
  catch(e){toast('Could not save!','err');}
}
function autoSave(){saveData(true);}

function checkAutoWeek(){
  const wk=getWeekKey();
  if(!history.weekly[wk]) snapshotCurrent('weekly');
}

function snapshotCurrent(period){
  let key;
  if(period==='weekly') key=getWeekKey();
  else if(period==='monthly') key=getMonthKey();
  else if(period==='quarterly') key=getQtrKey();
  else key=getYearKey();
  if(history[period+'ly']&&history[period+'ly'][key]) return;
  if(!history[period]) history[period]={};
  const snap={key,date:todayStr(),period,
    totalSV:0,totalInv:0,totalRev:0,totalSold:0,
    locations:{}
  };
  LKS.forEach(k=>{
    const items=data[k];
    const sv=items.reduce((s,i)=>s+i.cp*i.qty,0);
    const inv=items.reduce((s,i)=>s+i.cp*i.purchased,0);
    const rev=items.reduce((s,i)=>s+i.revenue,0);
    const sold=items.reduce((s,i)=>s+i.sold,0);
    snap.totalSV+=sv;snap.totalInv+=inv;snap.totalRev+=rev;snap.totalSold+=sold;
    snap.locations[k]={sv,inv,rev,sold,items:items.map(i=>({name:i.name,cat:i.cat,qty:i.qty,sold:i.sold,revenue:i.revenue,cp:i.cp}))};
  });
  history[period][key]=snap;
  autoSave();
}

function toast(msg,type){
  const w=document.getElementById('tw');const d=document.createElement('div');
  const ic={ok:'fa-circle-check',warn:'fa-triangle-exclamation',err:'fa-circle-xmark'};
  d.className=`toast ${type||'ok'}`;d.innerHTML=`<i class="fa-solid ${ic[type]||ic.ok}"></i>${msg}`;
  w.appendChild(d);setTimeout(()=>d.remove(),3000);
}

const st=i=>{if(i.qty===0||i.qty<=i.min*0.5)return'crit';if(i.qty<=i.min)return'low';return'ok';};
const sortItems=items=>[...items].sort((a,b)=>{const o={crit:0,low:1,ok:2};return o[st(a)]-o[st(b)];});

function setLoc(l){
  curLoc=l;
  document.querySelectorAll('.ltb').forEach(b=>b.classList.remove('act'));
  document.getElementById('ltb-'+l).classList.add('act');
  // Hide Reports & Analytics when not on All
  const repBtn=document.getElementById('nb-reports');
  const anaBtn=document.getElementById('nb-analytics');
  if(l==='all'){
    if(repBtn) repBtn.style.display='';
    if(anaBtn) anaBtn.style.display='';
  } else {
    if(repBtn) repBtn.style.display='none';
    if(anaBtn) anaBtn.style.display='none';
    // If currently on reports/analytics page, switch to home
    if(curPage==='reports'||curPage==='analytics'){setPage('home');return;}
  }
  render();
}
function setPage(p){curPage=p;document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));document.getElementById('nb-'+p).classList.add('act');render();window.scrollTo(0,0);}

function render(){
  const b=document.getElementById('body');
  if(curPage==='home') b.innerHTML=buildHome();
  else if(curPage==='stock') b.innerHTML=buildStock();
  else if(curPage==='sale') b.innerHTML=buildSale();
  else if(curPage==='purchase') b.innerHTML=buildPurchase();
  else if(curPage==='pl') b.innerHTML=buildPL();
  else if(curPage==='transfer') b.innerHTML=buildTransfer();
  else if(curPage==='reports') b.innerHTML=buildReports();
  else if(curPage==='analytics') b.innerHTML=buildAnalytics();
  else if(curPage==='log') b.innerHTML=buildLog();
}

  h+='<div class="card"><div class="ctitle"><i class="fa-solid fa-triangle-exclamation"></i>Stock Alerts</div>';
  let any=false;
  LKS.forEach(k=>{sortItems(data[k]).filter(i=>st(i)!=='ok').forEach(i=>{any=true;const s=st(i);h+=`<div class="alert ${s==='crit'?'err':'warn'}"><i class="fa-solid fa-${s==='crit'?'circle-xmark':'triangle-exclamation'}"></i><div><b>${LOCS[k].name}:</b> ${i.name} — only <b>${i.qty}</b> left (min: ${i.min})</div></div>`;});});

function buildSale(){

  let h=`<div class="stitle">🧾 Record a Sale</div><div class="ssub">SP is not fixed — enter the actual amount received each time</div>

  lks.forEach(k=>{
    h+=`<div class="card">
      <div class="ctitle"><span class="ldot" style="background:${LOCS[k].dot};display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle"></span>${LOCS[k].name}</div>
      <div class="fg"><label>Select item</label><select id="sItem_${k}">${sortItems(data[k]).map(i=>`<option value="${i.id}">${i.name} — ${i.qty} in stock</option>`).join('')}</select></div>
      <div class="r3">
        <div class="fg"><label>Units sold</label><input id="sQty_${k}" type="number" min="1" value="1" oninput="cA('${k}')"/></div>
        <div class="fg"><label>Rate per piece ₹</label><input id="sSP_${k}" type="number" min="0" placeholder="e.g. 145" oninput="cA('${k}')"/></div>
        <div class="fg"><label>Total amount ₹</label><input id="sAmt_${k}" type="number" min="0" placeholder="auto" oninput="cR('${k}')"/></div>
      </div>

      <button class="btn green full" onclick="recSale('${k}')"><i class="fa-solid fa-receipt"></i> Record Sale — ${LOCS[k].name}</button>
    </div>`;
  });
  const recent=txLog.filter(t=>t.type==='Sale'&&(curLoc==='all'||t.loc===curLoc)).slice(-6).reverse();
  if(recent.length){h+=`<div class="card"><div class="ctitle"><i class="fa-solid fa-clock-rotate-left"></i>Recent Sales</div>`;recent.forEach(t=>{h+=`<div class="tx-item"><div style="display:flex;justify-content:space-between"><b>${t.item}</b><span style="font-size:12px;color:var(--text2)">${t.date}</span></div><div style="font-size:12px;color:var(--text2);margin-top:2px">${LOCS[t.loc]?.name||''} · ${t.detail}</div></div>`;});h+='</div>';}

function cA(k){const q=parseFloat(gv(`sQty_${k}`))||0,sp=parseFloat(gv(`sSP_${k}`))||0;if(q>0&&sp>0)sv2(`sAmt_${k}`,Math.round(q*sp));upP(k);}
function cR(k){const q=parseFloat(gv(`sQty_${k}`))||0,a=parseFloat(gv(`sAmt_${k}`))||0;if(q>0&&a>0)sv2(`sSP_${k}`,(a/q).toFixed(2));upP(k);}
function upP(k){const q=parseFloat(gv(`sQty_${k}`))||0,a=parseFloat(gv(`sAmt_${k}`))||0,sp=parseFloat(gv(`sSP_${k}`))||0;const el=document.getElementById(`sPrev_${k}`);if(!el)return;const tot=a>0?a:q*sp;if(q>0&&tot>0)el.innerHTML=`<div class="alert ok" style="margin-bottom:0"><i class="fa-solid fa-circle-check"></i><b>Preview:</b> ${q} pcs × ₹${(tot/q).toFixed(0)} = <b>${fmt(tot)}</b></div>`;else el.innerHTML='';}

// ── P&L ──────────────────────────────────────────────────────────
function buildPL(){

    const pl=rev-inv;const sv=items.reduce((s,i)=>s+i.cp*i.qty,0);const isP=pl>=0;
    h+=`<div class="card">
      <div class="ctitle"><span class="ldot" style="background:${LOCS[k].dot};display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle"></span>${LOCS[k].name}</div>

        <div class="metric"><div class="mlabel">Revenue (actual sales)</div><div class="mval green">${fmt(rev)}</div></div>
        <div class="metric"><div class="mlabel">Unsold stock value</div><div class="mval blue">${fmt(sv)}</div></div>
      </div>
      <div class="plbox ${isP?'pl-p':'pl-l'}">
        <div><div style="font-size:13px;font-weight:700;color:${isP?'var(--green)':'var(--red)'};margin-bottom:5px">${isP?'Monthly Profit 🟢':'Monthly Loss 🔴'}</div>
        <div class="plbig" style="color:${isP?'var(--green)':'var(--red)'}">${isP?'+':''}${fmt(pl)}</div>
        <div style="font-size:12px;color:${isP?'var(--green)':'var(--red)'};margin-top:5px">Revenue ${fmt(rev)} − Invested ${fmt(inv)}</div></div>
        <i class="fa-solid fa-${isP?'arrow-trend-up':'arrow-trend-down'}" style="font-size:48px;opacity:0.18;color:${isP?'var(--green)':'var(--red)'}"></i>
      </div>
      <div class="tw" style="overflow-x:auto"><table class="tbl"><thead><tr><th>Item</th><th>CP ₹</th><th>Bought</th><th>Sold</th><th>Revenue</th><th>Invested</th><th>P&L</th></tr></thead><tbody>
        ${sortItems(items).map(i=>{const ipl=i.revenue-(i.cp*i.purchased);return `<tr><td><b>${i.name}</b></td><td>${fmt(i.cp)}</td><td>${i.purchased}</td><td>${i.sold}</td><td style="color:var(--green);font-weight:700">${fmt(i.revenue)}</td><td style="color:var(--blue)">${fmt(i.cp*i.purchased)}</td><td style="font-weight:800;color:${ipl>=0?'var(--green)':'var(--red)'}">${ipl>=0?'+':''}${fmt(ipl)}</td></tr>`;}).join('')}

    </div>`;
  });
  return h;
}

// ── REPORTS ──────────────────────────────────────────────────────
function buildReports(){
  let h=`<div class="stitle">📋 Reports & Summaries</div><div class="ssub">Select a period to generate your summary. Share via WhatsApp or Email.</div>`;
  h+=`<div class="rep-tabs">
    <button class="rtb ${curRep==='weekly'?'act':''}" onclick="setRep('weekly')">📅 Weekly</button>
    <button class="rtb ${curRep==='monthly'?'act':''}" onclick="setRep('monthly')">🗓 Monthly</button>
    <button class="rtb ${curRep==='quarterly'?'act':''}" onclick="setRep('quarterly')">📆 Quarterly</button>
    <button class="rtb ${curRep==='yearly'?'act':''}" onclick="setRep('yearly')">🗓️ Yearly</button>
  </div>`;

  // Monthly multi-select UI
  if(curRep==='monthly'){
    const allMonths = getAvailableMonths();
    h+=`<div class="card" style="margin-bottom:14px">
      <div class="ctitle"><i class="fa-solid fa-calendar-days"></i>Select Months to View</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn ${curMonthCount===1?'primary':''}" onclick="setMonthCount(1)">1 Month</button>
        <button class="btn ${curMonthCount===2?'primary':''}" onclick="setMonthCount(2)">2 Months</button>
        <button class="btn ${curMonthCount===3?'primary':''}" onclick="setMonthCount(3)">3 Months</button>
        <button class="btn ${curMonthCount===6?'primary':''}" onclick="setMonthCount(6)">6 Months</button>
        <button class="btn ${curMonthCount===12?'primary':''}" onclick="setMonthCount(12)">Full Year</button>
      </div>
      <div class="fg" style="max-width:320px;margin-bottom:0">
        <label>Starting from month</label>
        <select onchange="setCurMonthRange(this.value)">
          ${allMonths.map(m=>`<option value="${m.key}" ${m.key===(curMonthRange||allMonths[0]?.key)?'selected':''}>${m.label}</option>`).join('')}
        </select>
      </div>
    </div>`;
  }

  // Snapshot current before showing
  snapshotCurrent(curRep);

  const hist=history[curRep]||{};
  const keys=Object.keys(hist).sort().reverse();

  if(!keys.length){h+=`<div class="alert info"><i class="fa-solid fa-circle-info"></i>No ${curRep} data saved yet. Data is auto-saved each week.</div>`;return h;}

  if(curRep==='monthly'){
    // Multi-month aggregated view
    const allMonths=getAvailableMonths();
    const startKey=curMonthRange||allMonths[0]?.key||getMonthKey();
    const startIdx=allMonths.findIndex(m=>m.key===startKey);
    const selectedKeys=allMonths.slice(startIdx,startIdx+curMonthCount).map(m=>m.key);
    const snaps=selectedKeys.map(k=>hist[k]).filter(Boolean);

    if(!snaps.length){h+=`<div class="alert warn"><i class="fa-solid fa-triangle-exclamation"></i>No saved data for selected months yet.</div>`;return h;}

    // Aggregate
    const agg={totalSV:0,totalInv:0,totalRev:0,totalSold:0,locations:{}};
    snaps.forEach(s=>{
      agg.totalInv+=s.totalInv;agg.totalRev+=s.totalRev;agg.totalSold+=s.totalSold;
      agg.totalSV=s.totalSV; // use latest SV
      LKS.forEach(k=>{
        if(!s.locations[k])return;
        if(!agg.locations[k])agg.locations[k]={sv:0,inv:0,rev:0,sold:0};
        agg.locations[k].inv+=s.locations[k].inv;
        agg.locations[k].rev+=s.locations[k].rev;
        agg.locations[k].sold+=s.locations[k].sold;
        agg.locations[k].sv=s.locations[k].sv;
      });
    });
    const pl=agg.totalRev-agg.totalInv;const isP=pl>=0;
    const periodLabel=snaps.length===1?selectedKeys[0]:`${selectedKeys[selectedKeys.length-1]} → ${selectedKeys[0]}`;
    const repText=buildReportTextAgg(agg,periodLabel,'Monthly');
    h+=`<div class="rep-card">
      <div class="rep-title">Monthly Report ${snaps.length>1?`(${snaps.length} months)`:''}</div>
      <div class="rep-sub">Period: ${periodLabel} &nbsp;|&nbsp; Khushboo Sanitary World</div>
      <div class="rep-grid">
        <div class="rep-stat"><div class="rep-stat-label">Stock Value</div><div class="rep-stat-val">${fmt(agg.totalSV)}</div></div>
        <div class="rep-stat"><div class="rep-stat-label">Total Revenue</div><div class="rep-stat-val">${fmt(agg.totalRev)}</div></div>
        <div class="rep-stat"><div class="rep-stat-label">Total Invested</div><div class="rep-stat-val">${fmt(agg.totalInv)}</div></div>
        <div class="rep-stat"><div class="rep-stat-label">Net P&L</div><div class="rep-stat-val">${isP?'+':''}${fmt(pl)}</div></div>
        <div class="rep-stat"><div class="rep-stat-label">Units Sold</div><div class="rep-stat-val">${fmtN(agg.totalSold)}</div></div>
      </div>
      <div class="share-row">
        <button class="sbtn wa" onclick="shareWA()"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
        <button class="sbtn em" onclick="shareEmail()"><i class="fa-solid fa-envelope"></i> Email</button>
        <button class="sbtn copy" onclick="copyReport()"><i class="fa-solid fa-copy"></i> Copy</button>
      </div>
    </div>`;

    // Month by month breakdown table
    if(snaps.length>1){
      h+=`<div class="card"><div class="ctitle"><i class="fa-solid fa-table"></i>Month by Month Breakdown</div>
      <div class="tw"><table class="tbl"><thead><tr><th>Month</th><th>Revenue</th><th>Invested</th><th>P&L</th><th>Units Sold</th></tr></thead><tbody>`;
      snaps.forEach((s,idx)=>{const spl=s.totalRev-s.totalInv;h+=`<tr>
        <td><b>${selectedKeys[idx]}</b></td>
        <td style="color:var(--green);font-weight:700">${fmt(s.totalRev)}</td>
        <td>${fmt(s.totalInv)}</td>
        <td style="font-weight:700;color:${spl>=0?'var(--green)':'var(--red)'}">${spl>=0?'+':''}${fmt(spl)}</td>
        <td>${fmtN(s.totalSold)}</td></tr>`;});
      h+=`</tbody></table></div></div>`;
    }

    h+=`<div class="card"><div class="ctitle"><i class="fa-solid fa-table"></i>Location Breakdown</div>
    <div class="tw"><table class="tbl"><thead><tr><th>Location</th><th>Revenue</th><th>Invested</th><th>P&L</th><th>Units Sold</th></tr></thead><tbody>`;
    LKS.forEach(k=>{const loc=agg.locations[k];if(!loc)return;const lpl=loc.rev-loc.inv;
      h+=`<tr><td><span class="ldot" style="background:${LOCS[k].dot};display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle"></span><b>${LOCS[k].name}</b></td>
      <td style="color:var(--green);font-weight:700">${fmt(loc.rev)}</td><td>${fmt(loc.inv)}</td>
      <td style="font-weight:800;color:${lpl>=0?'var(--green)':'var(--red)'}">${lpl>=0?'+':''}${fmt(lpl)}</td>
      <td>${fmtN(loc.sold)}</td></tr>`;});
    h+=`</tbody></table></div></div>`;
    h+=`<textarea id="repTextArea" style="position:absolute;left:-9999px">${repText}</textarea>`;
  } else {

function getAvailableMonths(){
  const hist=history['monthly']||{};
  const keys=Object.keys(hist).sort().reverse();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return keys.map(k=>{
    // key format: 2024-M06
    const parts=k.split('-M');
    const year=parts[0];const mon=parseInt(parts[1])-1;
    return {key:k,label:`${MONTHS[mon]||parts[1]} ${year}`};
  });
}

function setCurMonthRange(v){curMonthRange=v;render();}

function startNewWeek(){
  if(!confirm('Start new week?\n\n✓ Stock quantities carry forward\n✓ Weekly sale/purchase counts reset\n✓ Current data saved to history')) return;
  snapshotCurrent('weekly');
  snapshotCurrent('monthly');
  snapshotCurrent('quarterly');
  snapshotCurrent('yearly');
  // Reset weekly counters — stock stays
  LKS.forEach(k=>data[k].forEach(i=>{i.wSold=0;i.wRevenue=0;i.wPurchased=0;}));
  autoSave();toast('New week started! Stock carried forward ✓','ok');render();
}

function saveSnapshot(){
  const periods=['weekly','monthly','quarterly','yearly'];
  periods.forEach(p=>{
    const hist=history[p]||{};
    let key;
    if(p==='weekly') key=getWeekKey();
    else if(p==='monthly') key=getMonthKey();
    else if(p==='quarterly') key=getQtrKey();
    else key=getYearKey();
    // Force overwrite for manual save
    delete hist[key];
    history[p]=hist;
    snapshotCurrent(p);
  });
  autoSave();toast('Snapshot saved for all periods ✓','ok');
}

function buildAnalytics(){
  const lks = curLoc==='all' ? LKS : [curLoc];

  const allItems = [];
  lks.forEach(k => {
    data[k].forEach(i => {
      // profit per unit = (revenue/sold) - cp, or 0 if not sold
      const avgSP = i.sold > 0 ? i.revenue / i.sold : 0;
      const profitPerUnit = avgSP - i.cp;
      const totalProfit = i.revenue - (i.cp * i.purchased);
      allItems.push({...i, loc:k, avgSP, profitPerUnit, totalProfit});
    });
  });

  // 1. Fast moving (most units sold)
  const fastMoving = [...allItems].sort((a,b)=>b.sold-a.sold).slice(0,8);

  const deadStock = allItems.filter(i=>(i.lastSoldDays||0)>=90 || (i.sold===0 && i.qty>0)).sort((a,b)=>(b.lastSoldDays||999)-(a.lastSoldDays||999));
  // 3. Highest profit items
  const highProfit = [...allItems].filter(i=>i.sold>0).sort((a,b)=>b.totalProfit-a.totalProfit).slice(0,8);

  <div class="tw"><table class="tbl"><thead><tr><th>#</th><th>Brand</th><th>Revenue</th><th>Units Sold</th><th>Profit</th></tr></thead><tbody>`;
  brandWise.forEach((b,idx)=>{

// ── ACTIONS ──────────────────────────────────────────────────────
const gv=id=>{const e=document.getElementById(id);return e?e.value:'';};
const sv2=(id,val)=>{const e=document.getElementById(id);if(e)e.value=val;};

function adjQ(loc,id,dir){
  const inp=document.getElementById(`q_${loc}_${id}`);
  const qty=Math.max(1,parseInt(inp?inp.value:1)||1);
  const item=data[loc].find(i=>i.id===id);if(!item)return;
  if(dir>0){item.qty+=qty;item.purchased+=qty;item.wPurchased=(item.wPurchased||0)+qty;txLog.push({loc,type:'Purchase',item:item.name,qty,detail:`Added ${qty} pcs`,date:todayStr(),from:loc,to:loc});}
  else{const t=Math.min(qty,item.qty);item.qty-=t;txLog.push({loc,type:'Deduct',item:item.name,qty:t,detail:`Deducted ${t} pcs`,date:todayStr(),from:loc,to:loc});}
  autoSave();render();
}

function recSale(k){
  const id=parseInt(gv(`sItem_${k}`));const qty=Math.max(1,parseInt(gv(`sQty_${k}`))||1);
  const amt=parseFloat(gv(`sAmt_${k}`))||0;const sp=parseFloat(gv(`sSP_${k}`))||0;
  const item=data[k].find(i=>i.id===id);if(!item)return;
  if(qty>item.qty){toast(`Only ${item.qty} in stock!`,'warn');return;}
  if(amt<=0&&sp<=0){toast('Enter rate or total amount','warn');return;}
  const fa=amt>0?amt:qty*sp;
  item.qty-=qty;item.sold+=qty;item.revenue+=fa;
  item.wSold=(item.wSold||0)+qty;item.wRevenue=(item.wRevenue||0)+fa;
  item.lastSoldDays=0;
  txLog.push({loc:k,type:'Sale',item:item.name,qty,detail:`${qty} pcs @ ₹${(fa/qty).toFixed(0)}/pc = ${fmt(fa)}`,date:todayStr(),from:k,to:k});
  toast(`Sale: ${qty} × ${item.name} = ${fmt(fa)}`,'ok');
  autoSave();render();
}

function recBuy(k){
  const id=parseInt(gv(`pItem_${k}`));const qty=Math.max(1,parseInt(gv(`pQty_${k}`))||1);
  const cpIn=parseFloat(gv(`pCp_${k}`));
  const item=data[k].find(i=>i.id===id);if(!item)return;
  if(!isNaN(cpIn)&&cpIn>0) item.cp=cpIn;
  item.qty+=qty;item.purchased+=qty;item.wPurchased=(item.wPurchased||0)+qty;
  txLog.push({loc:k,type:'Purchase',item:item.name,qty,detail:`${qty} pcs @ ₹${item.cp}/pc = ${fmt(qty*item.cp)}`,date:todayStr(),from:k,to:k});
  toast(`Purchase: ${qty} × ${item.name}`,'ok');
  autoSave();render();
}

function doTransfer(){
  const from=gv('tFrom'),to=gv('tTo');
  if(from===to){toast('From and To cannot be same','warn');return;}
  const id=parseInt(gv('tItem'));const qty=Math.max(1,parseInt(gv('tQty'))||1);
  const src=data[from].find(i=>i.id===id);if(!src)return;
  if(qty>src.qty){toast(`Only ${src.qty} available!`,'warn');return;}
  src.qty-=qty;
  let dst=data[to].find(i=>i.name===src.name);
  if(dst){dst.qty+=qty;}else{dst={id:nid[to]++,name:src.name,cat:src.cat,qty,min:src.min,cp:src.cp,purchased:0,revenue:0,sold:0,wPurchased:0,wRevenue:0,wSold:0};data[to].push(dst);}
  txLog.push({from,to,type:'Transfer out',item:src.name,qty,detail:`${LOCS[from].name} → ${LOCS[to].name}`,date:todayStr(),loc:from});
  txLog.push({from,to,type:'Transfer in',item:src.name,qty,detail:`${LOCS[from].name} → ${LOCS[to].name}`,date:todayStr(),loc:to});
  toast(`Transferred ${qty} × ${src.name} to ${LOCS[to].name}`,'ok');
  autoSave();render();
}

function editItem(loc,id){
  const item=data[loc].find(i=>i.id===id);if(!item)return;
  const cp=parseFloat(prompt(`New cost price for "${item.name}"\nCurrent: ₹${item.cp}`));
  if(!isNaN(cp)&&cp>=0) item.cp=cp;
  const mn=parseInt(prompt(`New min alert qty for "${item.name}"\nCurrent: ${item.min}`));
  if(!isNaN(mn)&&mn>=0) item.min=mn;
  autoSave();render();
}
function removeItem(loc,id){if(!confirm('Remove this item?'))return;data[loc]=data[loc].filter(i=>i.id!==id);autoSave();render();}
function addItem(k){
  const name=gv(`nName_${k}`).trim();if(!name){toast('Enter item name','warn');return;}
  const cat=gv(`nCat_${k}`),qty=parseInt(gv(`nQty_${k}`))||0,min=parseInt(gv(`nMin_${k}`))||5,cp=parseFloat(gv(`nCp_${k}`))||0;
  const brand=gv(`nBrand_${k}`).trim()||'Generic';
  data[k].push({id:nid[k]++,name,cat,brand,qty,min,cp,purchased:qty,revenue:0,sold:0,wPurchased:qty,wRevenue:0,wSold:0,lastSoldDays:0});
  if(qty>0) txLog.push({loc:k,type:'Purchase',item:name,qty,detail:`Opening stock ${qty} pcs`,date:todayStr(),from:k,to:k});
  toast(`Added: ${name}`,'ok');autoSave();render();
}


// ── PIN LOCK ──────────────────────────────────────────────────────
const DEFAULT_PIN = '1234';
let pinEntry = '';
let pinSetting = false;

function getStoredPin(){
  try{ return localStorage.getItem('ksw_pin') || DEFAULT_PIN; }catch(e){ return DEFAULT_PIN; }
}
function storePin(p){
  try{ localStorage.setItem('ksw_pin', p); }catch(e){}
}

function initPin(){
  const overlay = document.getElementById('pinOverlay');
  // Check if already unlocked this session
  if(sessionStorage.getItem('ksw_unlocked')==='1'){
    overlay.style.display='none'; return;
  }
  overlay.style.display='flex';
}

function pinPress(d){
  if(pinEntry.length >= 4) return;
  pinEntry += d;
  updatePinDots();
  if(pinEntry.length === 4){
    setTimeout(()=>checkPin(), 150);
  }
}

function pinClear(){
  pinEntry = pinEntry.slice(0,-1);
  updatePinDots();
  document.getElementById('pinError').textContent='';
}

function pinReset(){
  pinEntry='';
  updatePinDots();
  document.getElementById('pinError').textContent='';
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d) d.className='pin-dot'+(i<pinEntry.length?' filled':'');
  }
}

function checkPin(){
  if(pinSetting){
    // Setting new PIN
    storePin(pinEntry);
    sessionStorage.setItem('ksw_unlocked','1');
    document.getElementById('pinOverlay').style.display='none';
    toast('PIN set to '+pinEntry+' — remember it!','ok');
    pinEntry=''; pinSetting=false;
    return;
  }
  if(pinEntry === getStoredPin()){
    sessionStorage.setItem('ksw_unlocked','1');
    document.getElementById('pinOverlay').style.display='none';
    pinEntry='';
  } else {
    document.getElementById('pinError').textContent='Wrong PIN. Try again.';
    pinEntry='';
    updatePinDots();
    // Shake effect
    const box=document.querySelector('.pin-box');
    box.style.animation='none';
    box.style.transform='translateX(8px)';
    setTimeout(()=>{box.style.transform='translateX(-8px)';},80);
    setTimeout(()=>{box.style.transform='none';},160);
  }
}

function pinForgot(){
  if(confirm('Reset PIN to default (1234)?')){
    storePin(DEFAULT_PIN);
    pinEntry='';
    updatePinDots();
    document.getElementById('pinError').textContent='PIN reset to 1234';
  }
}

// Change PIN from settings — called from header button
function changePIN(){
  pinSetting=true; pinEntry='';
  updatePinDots();
  document.getElementById('pinSubText').textContent='Set a new 4-digit PIN';
  document.getElementById('pinError').textContent='';
  document.getElementById('pinOverlay').style.display='flex';
}

initPin();

render();
</script>
